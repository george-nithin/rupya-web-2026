name: Market Data Sync

on:
  schedule:
    # Run every 5 minutes during market hours (IST 09:15 - 15:30 is approx UTC 03:45 - 10:00)
    # Cron uses UTC. 03:45 UTC is 09:15 IST.
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync_market_data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Backend Script
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        cd backend
        # The --once flag ensures it runs one cycle and exits, suitable for cron
        python main.py --once
